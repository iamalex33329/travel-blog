<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex's Travel Journal</title>
  <meta name="description" content="A personal travel journal through the world's most beautiful places.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="site-header" id="siteHeader">
    <a href="index.html" class="site-logo">Here & There</a>
    <nav class="header-nav">
      <a href="#archive">Archive</a>
      <a href="#about">About</a>
    </nav>
  </header>

  <!-- ── Compact Hero ────────────────────────────────────── -->
  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__grain"></div>
    <div class="container">
      <div class="hero__content page-fade-in">
        <h1 class="hero__title">Alex's Travel Journal</h1>
        <p class="hero__subtitle">Collecting moments across time zones.</p>
      </div>
    </div>
  </section>

  <!-- ── Editorial Archive ───────────────────────────────── -->
  <main id="archive" style="padding: var(--gap-lg) 0">
    <div id="tripsContainer">
      <!-- Loading skeleton -->
      <div class="container">
        <div style="display:grid;grid-template-columns:3fr 2fr;min-height:500px;gap:0;border:1px solid var(--color-border);margin-bottom:var(--gap-lg)">
          <div class="skeleton"></div>
          <div style="padding:var(--gap-lg);display:flex;flex-direction:column;gap:var(--gap-sm)">
            <div class="skeleton" style="height:12px;width:60%"></div>
            <div class="skeleton" style="height:48px;width:80%"></div>
            <div class="skeleton" style="height:12px;width:40%"></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--color-border)">
          <div class="skeleton" style="aspect-ratio:4/3"></div>
          <div class="skeleton" style="aspect-ratio:4/3"></div>
          <div class="skeleton" style="aspect-ratio:4/3"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer class="site-footer" id="about">
    <div class="container">
      <div class="footer-bottom">
        <span class="footer-logo">Alex Tsai</span>
        <span id="footerYear"></span>
      </div>
    </div>
  </footer>

  <!-- lightbox kept for future use -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox__inner">
      <button class="lightbox__close" id="lightboxClose">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Close
      </button>
      <img class="lightbox__img" id="lightboxImg" src="" alt="">
      <p class="lightbox__caption" id="lightboxCaption"></p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
